# CI：EditMode 测试（GameCI）。
# 需要在仓库 Settings → Secrets and variables → Actions 配置三个机密：
#   UNITY_LICENSE  — Unity 个人版许可证文件(.ulf)内容（https://game.ci/docs/github/activation）
#   UNITY_EMAIL    — Unity 账号邮箱
#   UNITY_PASSWORD — Unity 账号密码
# 未配置机密前，此工作流会失败在激活步骤——属预期，配好即绿。
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  editmode-tests:
    name: EditMode Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      # Library 缓存：首跑 ~20min 导入，之后分钟级
      - name: Cache Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-${{ hashFiles('Packages/manifest.json', 'ProjectSettings/ProjectVersion.txt') }}
          restore-keys: Library-

      - name: Run EditMode tests
        uses: game-ci/unity-test-runner@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          testMode: editmode
          artifactsPath: test-results

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: test-results

  # Go 权威服务器 / 无头模拟（N4-N6）。无需任何机密，配好即绿，与 Unity 作业并行。
  # 覆盖：跨语言对拍、帧同步、预测回滚、真 UDP 联机、网络健壮性（丢包/抖动/乱序）。
  # 注意：需把 server/（含 testdata/*.pb 对拍夹具）提交进 git，测试才能装载 Frank 数据。
  server-tests:
    name: Server (Go) Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: server/go.mod
          cache-dependency-path: server/go.sum

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Gofmt (fail if unformatted)
        run: test -z "$(gofmt -l .)" || { echo '未格式化的文件：'; gofmt -l .; exit 1; }

      - name: Test (race detector)
        run: go test -race ./...
